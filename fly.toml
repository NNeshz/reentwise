# fly.toml app configuration file generated for reentwise-api on 2026-03-26T22:24:56-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# Base de datos: externa (p. ej. Supabase). Configura DATABASE_URL (y opcional DIRECT_URL) con fly secrets.
# Migraciones: ejecútalas tú (bun run db:migrate / db:migrate:ci) o añade [deploy] release_command si quieres automatizarlas.

app = 'reentwise-api'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
